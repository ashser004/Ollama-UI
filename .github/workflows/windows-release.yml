name: Build Windows Installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Clean build artifacts
        shell: powershell
        run: |
          Remove-Item build, dist -Recurse -Force -ErrorAction SilentlyContinue

      - name: Generate installer icon
        run: |
          python scripts/generate_installer_icon.py "app/icon/icon-ui.png" "build/installer/LOCAL AI.ico"

      - name: Build LOCAL AI app
        shell: cmd
        run: |
          python -m PyInstaller --onefile --windowed --clean --noconfirm --name "LOCAL AI" --icon "build\installer\LOCAL AI.ico" --add-data "models.json;." --add-data "app\icon;app\icon" main.py

      - name: Install Inno Setup
        shell: cmd
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: powershell
        run: |
          $appVersion = "${env:GITHUB_REF_NAME}".TrimStart('v')
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "installer\LOCAL AI.iss" /DAppVersion=$appVersion

      - name: Write checksum
        shell: powershell
        run: |
          $installer = "build/installer/LOCAL AI Setup.exe"
          $hash = Get-FileHash $installer -Algorithm SHA256
          "$($hash.Hash)  $installer" | Out-File -Encoding ascii "build/installer/LOCAL AI Setup.sha256.txt"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LOCAL AI ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/installer/LOCAL AI Setup.exe
            build/installer/LOCAL AI Setup.sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}